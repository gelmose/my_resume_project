<!DOCTYPE html>
<html>
<head>
    <style>
        body { text-align: center; font-family: 'Comic Sans MS', sans-serif; background: #fff7ed; }
        #app-container { margin-top: 50px; border: 4px solid #c2410c; display: inline-block; padding: 20px; background: white; }
        button { background: #c2410c; color: white; border: none; padding: 10px 20px; cursor: pointer; }
        #answer { display: none; color: #15803d; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="app-container">
        <h2>The Schoolhouse Riddle Generator</h2>
        <p id="riddle-text">Click the button to start the quiz!</p>
        <button onclick="newRiddle()">Get a Riddle</button>
        <button onclick="showAnswer()">Show Answer</button>
        <p id="answer"></p>
        <p>Riddles Solved: <span id="score">0</span></p>
    </div>

    <script>
        const riddles = [
            { q: "I have keys but no locks. I have a space but no room. You can enter, but never leave. What am I?", a: "A keyboard" },
            { q: "What has many teeth but cannot bite?", a: "A comb (or a zipper!)" },
            { q: "What building has the most stories?", a: "The Library" },
            { q: "Why was the math book sad?", a: "Because it had too many problems." }
        ];
        let score = 0;

        function newRiddle() {
            const random = Math.floor(Math.random() * riddles.length);
            document.getElementById('riddle-text').innerText = riddles[random].q;
            document.getElementById('answer').innerText = riddles[random].a;
            document.getElementById('answer').style.display = 'none';
        }

        function showAnswer() {
            document.getElementById('answer').style.display = 'block';
            score++;
            document.getElementById('score').innerText = score;
        }
    </script>
    <div style="margin-top: 50px; padding: 20px; border-top: 2px dashed #c2410c;">
    <p style="font-style: italic;">Ready to head back to the mountain?</p>
    <a href="scratch.html" style="
        display: inline-block;
        background-color: #c2410c;
        color: white;
        padding: 10px 20px;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
    ">
        &larr; Return to Snowboarding Page
    </a>
</div>
</body>
</html>
